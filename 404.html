<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | INDUSQA</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: var(--primary-color);
            color: var(--white);
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="container">
            <div class="error-code">404</div>
            <div class="error-message">Oops! The page you're looking for doesn't exist.</div>
            <p style="margin-bottom: 30px;">It seems you've wandered into an uncertified zone.</p>
            <a href="index.html" class="cta-button">Back to Security (Home)</a>
        </div>
    </div>
</body>
</html>
